services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atrium_calls}
      POSTGRES_USER: ${POSTGRES_USER:-atrium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atrium} -d ${POSTGRES_DB:-atrium_calls}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-timbre}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-timbre-secret-change-me}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ASTERISK_ARI_ENABLED: ${ASTERISK_ARI_ENABLED:-false}
      ASTERISK_ARI_URL: ${ASTERISK_ARI_URL:-http://asterisk:8088/ari}
      ASTERISK_ARI_USER: ${ASTERISK_ARI_USER:-timbre}
      ASTERISK_ARI_PASSWORD: ${ASTERISK_ARI_PASSWORD:-change-me}
      ASTERISK_ARI_APP: ${ASTERISK_ARI_APP:-timbre-bot}
      SIP_TEST_EXTENSION: ${SIP_TEST_EXTENSION:-PJSIP/6001}
      SIP_CALLER_ID: ${SIP_CALLER_ID:-timbre.ai <1000>}
      # ulaw (default) evita transcoding en el bridge — trunk SIP usa ulaw/alaw
      # nativamente. slin16 daba problemas de "no oigo audio" en algunas builds.
      EXTERNAL_MEDIA_FORMAT: ${EXTERNAL_MEDIA_FORMAT:-ulaw}
      # AudioSocket reemplaza External Media. Si lo desactivas, vuelve a RTP/UDP.
      AUDIOSOCKET_ENABLED: ${AUDIOSOCKET_ENABLED:-true}
      AUDIOSOCKET_HOST: ${AUDIOSOCKET_HOST:-voice-agent}
      AUDIOSOCKET_PORT: ${AUDIOSOCKET_PORT:-9092}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-12h}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@timbre.ai}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_TENANT_EMAIL: ${BOOTSTRAP_TENANT_EMAIL:-owner@atrium.local}
      BOOTSTRAP_TENANT_PASSWORD: ${BOOTSTRAP_TENANT_PASSWORD}
      BOOTSTRAP_TENANT_ID: ${BOOTSTRAP_TENANT_ID:-atrium}
      VOICE_AGENT_URL: ${VOICE_AGENT_URL:-http://voice-agent:8090}
      VOICE_AGENT_SHARED_SECRET: ${VOICE_AGENT_SHARED_SECRET}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-timbre}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-timbre-recordings}
      # Vacío = URLs relativas "/storage/...". El frontend Next reenvía a minio.
      # Solo seteado si usas S3 externo o quieres exponer minio en un dominio.
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  voice-agent:
    build:
      context: ./voice-agent
    restart: unless-stopped
    environment:
      VOICE_AGENT_PORT: "8090"
      BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
      VOICE_AGENT_SHARED_SECRET: ${VOICE_AGENT_SHARED_SECRET}
      ALLOWED_ORIGINS: ${VOICE_AGENT_ALLOWED_ORIGINS:-*}
      RTP_PORT_START: ${RTP_PORT_START:-12000}
      RTP_PORT_END: ${RTP_PORT_END:-12099}
      RTP_ADVERTISE_HOST: ${RTP_ADVERTISE_HOST:-voice-agent}
      # DEBE coincidir con la env del backend del mismo nombre.
      EXTERNAL_MEDIA_FORMAT: ${EXTERNAL_MEDIA_FORMAT:-ulaw}
      # AudioSocket TCP server — Asterisk se conecta aquí cuando AUDIOSOCKET_ENABLED=true.
      AUDIOSOCKET_ENABLED: ${AUDIOSOCKET_ENABLED:-true}
      AUDIOSOCKET_PORT: ${AUDIOSOCKET_PORT:-9092}
      # API keys (OpenAI / Deepgram / AssemblyAI) viven en Postgres
      # (tabla tenant_voice_credentials), configurables desde /portal/settings.
    expose:
      - "8090"
      - "9092"
    ports:
      # RTP es UDP y Coolify/Traefik no lo proxean. Necesita binding directo al host.
      - "${RTP_PORT_START:-12000}-${RTP_PORT_END:-12099}:12000-12099/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      # Reverse proxy server-side (Next rewrites). Solo el frontend tiene
      # dominio público; backend y minio quedan en la red interna.
      BACKEND_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
      MINIO_URL: ${MINIO_INTERNAL_URL:-http://minio:9000}
    depends_on:
      - backend
    expose:
      - "3000"
    healthcheck:
      # Usamos node directamente — wget --spider en busybox es inconsistente
      # con respuestas 3xx (Next redirige / a /login) y a veces marca unhealthy
      # un servicio sano. Coolify/Traefik no rutea a unhealthy → "no available server".
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  asterisk:
    build:
      context: ./asterisk
    restart: unless-stopped
    environment:
      ASTERISK_ARI_USER: ${ASTERISK_ARI_USER:-timbre}
      ASTERISK_ARI_PASSWORD: ${ASTERISK_ARI_PASSWORD:-change-me}
      # AudioSocket host:port se interpola en extensions.conf en boot
      # (ver entrypoint.sh) — el dialplan ejecuta AudioSocket(uuid, host:port).
      AUDIOSOCKET_HOST: ${AUDIOSOCKET_HOST:-voice-agent}
      AUDIOSOCKET_PORT: ${AUDIOSOCKET_PORT:-9092}
      # Para que res_config_pgsql.conf.tpl pueda interpolar las credenciales
      # del Postgres compartido (mismo cluster que el backend).
      POSTGRES_DB: ${POSTGRES_DB:-atrium_calls}
      POSTGRES_USER: ${POSTGRES_USER:-atrium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - asterisk_spool:/var/spool/asterisk
      - asterisk_logs:/var/log/asterisk
    expose:
      - "8088"
    ports:
      # RTP del trunk SIP — UDP directo al host (Traefik no rutea UDP).
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10020}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10020}/udp"
      # SIP signaling (5060/udp) NO se mapea por defecto. Outbound no lo requiere.
      # Para inbound: añade un docker-compose.override.yml o mapea desde Coolify
      # con un puerto del host libre (ej. "5070:5060/udp").

volumes:
  postgres_data:
  redis_data:
  minio_data:
  asterisk_spool:
  asterisk_logs:
