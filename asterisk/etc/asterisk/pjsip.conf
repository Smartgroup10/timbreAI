; pjsip.conf — solo bloques que NO van por realtime.
;
; Los trunks de proveedores SIP (endpoints/auths/aors/registrations) viven en
; las tablas ps_* de Postgres y se gestionan desde el portal admin. Asterisk
; los lee vía sorcery + res_config_pgsql (ver sorcery.conf, extconfig.conf).
;
; Aquí solo queda el transporte UDP y el softphone interno 6001 para sandbox.

[global]
type=global
user_agent=timbre.ai

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; -----------------------------------------------------------------------------
; Endpoint interno (softphone). Para probar llamadas sin trunk real, registra
; un softphone (Zoiper/Linphone) como extensión 6001 con la contraseña de abajo.
; No va por realtime — es estático y nunca cambia.
; -----------------------------------------------------------------------------
[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=6001
aors=6001
direct_media=no

[6001]
type=auth
auth_type=userpass
username=6001
password=change-me

[6001]
type=aor
max_contacts=1
