[global]
type=global
user_agent=CallHub

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; -----------------------------------------------------------------------------
; Internal test endpoint (softphone). Use for sandbox dialing without a trunk.
; -----------------------------------------------------------------------------
[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw,alaw
auth=6001
aors=6001
direct_media=no

[6001]
type=auth
auth_type=userpass
username=6001
password=change-me

[6001]
type=aor
max_contacts=1

; -----------------------------------------------------------------------------
; SIP trunk (outbound dialing to real phone numbers).
;
; Configure the four blocks below with your SIP provider credentials (Twilio
; Elastic SIP Trunking, Vonage, Telnyx, etc.) and set
;   SIP_TRUNK_ENDPOINT=PJSIP/{phone}@trunk
; in your .env so the backend dials through this trunk.
; -----------------------------------------------------------------------------
; [trunk]
; type=endpoint
; context=from-trunk
; disallow=all
; allow=ulaw,alaw
; outbound_auth=trunk-auth
; aors=trunk-aor
; from_user=YOUR_TRUNK_USER
; from_domain=your-provider.example.com
; direct_media=no
;
; [trunk-auth]
; type=auth
; auth_type=userpass
; username=YOUR_TRUNK_USER
; password=YOUR_TRUNK_PASSWORD
;
; [trunk-aor]
; type=aor
; contact=sip:your-provider.example.com:5060
;
; [trunk-identify]
; type=identify
; endpoint=trunk
; match=your-provider.example.com
