; Realtime config families → Postgres (via res_config_pgsql).
;
; Cada línea: <familia> => <driver>,<config_section>,<tabla>
; - "pgsql" es el driver (res_config_pgsql)
; - "asterisk-realtime" es la sección de res_config_pgsql.conf (en nuestro caso [general])
; - el tercer campo es el nombre de la tabla en Postgres
;
; Sorcery (la API moderna de PJSIP) usa estas familias internamente.

[settings]
ps_endpoints       => pgsql,general,ps_endpoints
ps_auths           => pgsql,general,ps_auths
ps_aors            => pgsql,general,ps_aors
ps_contacts        => pgsql,general,ps_contacts
ps_endpoint_id_ips => pgsql,general,ps_endpoint_id_ips
ps_registrations   => pgsql,general,ps_registrations
ps_transports      => pgsql,general,ps_transports
