; Sorcery: dile a PJSIP que use Realtime para cada tipo.
; Sintaxis: <tipo> = realtime,<familia de extconfig.conf>
;
; "config" (estático en pjsip.conf) + "realtime" se pueden combinar para tipos
; que aceptan multiple wizard, pero aquí dejamos transports estáticos y todo
; lo demás en realtime — más limpio.

[res_pjsip]
endpoint=realtime,ps_endpoints
auth=realtime,ps_auths
aor=realtime,ps_aors
domain_alias=realtime,ps_domain_aliases
contact=realtime,ps_contacts

[res_pjsip_endpoint_identifier_ip]
identify=realtime,ps_endpoint_id_ips

[res_pjsip_outbound_registration]
registration=realtime,ps_registrations
