; Sorcery: dile a PJSIP que use Realtime para cada tipo persistente.
; Sintaxis: <tipo> = realtime,<familia de extconfig.conf>
;
; OJO:
; - "contact" NO va en realtime: los contacts son dinámicos y Asterisk los
;   maneja en memoria por defecto (sorcery_memory). Forzarlos a realtime
;   requiere una tabla con esquema específico y hace que res_pjsip "decline
;   to load" si no está perfecto.
; - "domain_alias" tampoco: no lo usamos, y referenciarlo si la tabla no
;   existe rompe el boot.

[res_pjsip]
endpoint=realtime,ps_endpoints
auth=realtime,ps_auths
aor=realtime,ps_aors

[res_pjsip_endpoint_identifier_ip]
identify=realtime,ps_endpoint_id_ips

[res_pjsip_outbound_registration]
registration=realtime,ps_registrations
