[general]
static=yes
writeprotect=no

[globals]

; Internal extensions used for sandbox testing without a real trunk.
[from-internal]
exten => 1000,1,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; ARI entrypoint for outbound test calls originated from the backend.
; The backend passes the CALLHUB_CALL_ID and CALLHUB_TENANT channel variables and AppArgs.
exten => 9000,1,NoOp(CallHub AI test entrypoint - call=${CALLHUB_CALL_ID} tenant=${CALLHUB_TENANT})
 same => n,Answer()
 same => n,Stasis(callhub-bot,${CALLHUB_CALL_ID},${CALLHUB_TENANT})
 same => n,Hangup()

; Echo dialplan for plumbing validation when no trunk is configured.
; Originate to Local/echo@callhub-test to verify ARI Originate -> Stasis end to end.
[callhub-test]
exten => echo,1,NoOp(CallHub echo target)
 same => n,Answer()
 same => n,Playback(demo-thanks)
 same => n,Wait(1)
 same => n,Stasis(callhub-bot,echo)
 same => n,Hangup()

[from-trunk]
exten => _X.,1,NoOp(Inbound call from trunk)
 same => n,Answer()
 same => n,Stasis(callhub-inbound-bot)
 same => n,Hangup()
