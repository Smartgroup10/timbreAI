[general]
static=yes
writeprotect=no

[globals]

; Internal extensions used for sandbox testing without a real trunk.
[from-internal]
exten => 1000,1,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; ARI entrypoint for outbound test calls originated from the backend.
; The backend passes the TIMBRE_CALL_ID and TIMBRE_TENANT channel variables and AppArgs.
exten => 9000,1,NoOp(timbre.ai AI test entrypoint - call=${TIMBRE_CALL_ID} tenant=${TIMBRE_TENANT})
 same => n,Answer()
 same => n,Stasis(timbre-bot,${TIMBRE_CALL_ID},${TIMBRE_TENANT})
 same => n,Hangup()

; Echo dialplan for plumbing validation when no trunk is configured.
; Originate to Local/echo@timbre-test to verify ARI Originate -> Stasis end to end.
[timbre-test]
exten => echo,1,NoOp(timbre.ai echo target)
 same => n,Answer()
 same => n,Playback(demo-thanks)
 same => n,Wait(1)
 same => n,Stasis(timbre-bot,echo)
 same => n,Hangup()

[from-trunk]
exten => _X.,1,NoOp(Inbound call from trunk)
 same => n,Answer()
 same => n,Stasis(timbre-inbound-bot)
 same => n,Hangup()
